name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: rezwoan-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    # Targets the dedicated portfolio runner on the Pi (label set at registration).
    runs-on: [self-hosted, rezwoan]
    steps:
      - name: Deploy
        run: bash /var/www/rezwoan-portfolio/scripts/deploy.sh
